<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="home">
    <section class="panel">
      <p class="eyebrow">Task Manager</p>
      <h1>Connexion</h1>
      <form id="login-form" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="exemple@email.com" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="Votre mot de passe" required>

        <button type="submit">Se connecter</button>
      </form>
      <p id="message" class="message"></p>
      <p class="muted">Pas encore de compte ? <a href="/register">Creer un compte</a></p>
    </section>
  </main>
  <script src="../js/auth.js"></script>
</body>
</html>
