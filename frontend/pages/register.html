<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js" defer></script>
</head>
<body>
  <main class="home">
    <section class="panel">
      <div class="theme-corner">
        <button id="theme-toggle" type="button" class="secondary">Mode sombre</button>
      </div>
      <p class="eyebrow">Task Manager</p>
      <h1>Creer un compte</h1>
      <form id="register-form" class="auth-form">
        <label for="name">Nom</label>
        <input id="name" name="name" type="text" placeholder="Votre nom" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="exemple@email.com" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="Minimum 6 caracteres" required minlength="6">

        <button type="submit">S'inscrire</button>
      </form>
      <p id="message" class="message"></p>
      <p class="muted">Deja un compte ? <a href="/login">Se connecter</a></p>
    </section>
  </main>
  <script src="../js/auth.js"></script>
</body>
</html>
